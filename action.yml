name: 'Trivy Scan and Report'
description: 'Scan for vulnerabilities and report in pull request'
inputs:
  github_token:
    description: 'GitHub Token'
    required: true

  skip_dirs:
    description: 'A comma separated list of folders to ignore'
    required: false

runs:
  using: 'composite'
  steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check git ref
      shell: bash
      run: |
        echo "Git ref: $GITHUB_REF"

    - name: Run Trivy for PR report
      uses: aquasecurity/trivy-action@v0.35.0
      id: scan
      env:
        TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
      with:
        scan-type: 'fs'
        format: 'json'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
        output: 'trivy.json'
        exit-code: 1
        skip-dirs: ${{ inputs.skip_dirs }}
        scanners: 'vuln'

    - name: Report vulnerabilities in PR
      if: failure() && steps.scan.outcome == 'failure'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        echo '### Trivy fs scan - Vulnerabilities detected\nThe following vulnerabilities of HIGH or CRITICAL severity has been detected in the code. Please resolve these before merging the pull request.\n\n' > result.md
        cat trivy.json | jq '[ .Results[] | .Vulnerabilities[]? | { "id": .VulnerabilityID, "title": .Title, "url": .PrimaryURL, "description": .Description } ] | unique' \
          | jq -r '.[] | "\n#### \(.id) - \(.title)\n\(.url)\n\(.description)"' >> result.md
        cat result.md | jq -Rs '{ body: . }' > result.json
        curl -X POST -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          ${{ github.event.pull_request.comments_url }} \
          -d @result.json

    - name: Report no vulnerabilities in PR
      if: success() && steps.scan.outcome == 'success'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        echo -n "{\"body\":\"### Trivy fs scan - No vulnerabilities detected\nNo vulnerabilities of HIGH or CRITICAL severity has been detected in the code.\"}" > result.json
        curl -X POST -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          ${{ github.event.pull_request.comments_url }} \
          -d @result.json
